<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/media/favicon.ico" />
  <link rel="apple-touch-icon" sizes="120x120" href="/media/apple-touch-icon-120.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="/media/apple-touch-icon-152.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/media/apple-touch-icon-180.png" />
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#E57200">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Van Dispatch — Paratransit</title>
  <script defer src="/nav-bar.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Inter", "Segoe UI", system-ui, sans-serif;
      background: #0d0d0d;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: linear-gradient(120deg, #1a0a3d, #0f0820);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      border-bottom: 2px solid #6c3fc5;
    }
    header h1 {
      font-size: 1.3rem;
      font-weight: 700;
      color: #e0d0ff;
      letter-spacing: 0.02em;
    }
    header .subtitle {
      font-size: 0.8rem;
      color: #9980d0;
      margin-left: auto;
    }
    #status-bar {
      background: #1a1a2e;
      padding: 0.4rem 1.5rem;
      font-size: 0.78rem;
      color: #888;
      border-bottom: 1px solid #2a2a44;
      display: flex;
      gap: 1.5rem;
      align-items: center;
    }
    #status-bar .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #555;
      display: inline-block;
    }
    .dot.live { background: #4caf50; box-shadow: 0 0 6px #4caf5099; }
    .dot.warn { background: #ff9800; }
    .dot.off  { background: #f44336; }

    .main-layout {
      display: grid;
      grid-template-columns: 1fr 420px;
      grid-template-rows: 1fr auto;
      flex: 1;
      min-height: 0;
    }
    /* Map */
    #map-pane {
      grid-row: 1;
      grid-column: 1;
      position: relative;
    }
    #map {
      width: 100%;
      height: 100%;
      min-height: 400px;
      background: #111;
    }
    #map-no-webhooks {
      display: none;
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.75);
      color: #ffd54f;
      font-size: 0.75rem;
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      pointer-events: none;
      white-space: nowrap;
    }

    /* Trip board */
    #trip-board {
      grid-row: 1;
      grid-column: 2;
      display: flex;
      flex-direction: column;
      background: #111;
      border-left: 1px solid #2a2a44;
      overflow: hidden;
    }
    #trip-board h2 {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #9980d0;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #2a2a44;
      background: #16162a;
    }
    #trip-board h2 span {
      float: right;
      font-size: 0.75rem;
      color: #666;
      font-weight: 400;
      letter-spacing: 0;
      text-transform: none;
    }
    #trips-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem;
    }
    .trip-card {
      background: #1a1a2e;
      border: 1px solid #2a2a44;
      border-radius: 8px;
      padding: 0.7rem 0.8rem;
      margin-bottom: 0.5rem;
      transition: border-color 0.2s;
    }
    .trip-card:hover { border-color: #6c3fc5; }
    .trip-card.arriving { border-left: 3px solid #ff9800; }
    .trip-card.inProgress { border-left: 3px solid #4caf50; }
    .trip-card.accepted { border-left: 3px solid #2196f3; }
    .trip-card.processing { border-left: 3px solid #9e9e9e; }
    .trip-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.4rem;
    }
    .status-pill {
      font-size: 0.68rem;
      font-weight: 600;
      padding: 0.15rem 0.45rem;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .status-pill.processing { background: #333; color: #aaa; }
    .status-pill.accepted   { background: #1565c0; color: #90caf9; }
    .status-pill.arriving   { background: #e65100; color: #ffe0b2; }
    .status-pill.inProgress { background: #1b5e20; color: #a5d6a7; }
    .rider-name {
      font-size: 0.9rem;
      font-weight: 600;
      color: #e0d0ff;
      flex: 1;
    }
    .trip-body {
      font-size: 0.78rem;
      color: #aaa;
      line-height: 1.5;
    }
    .trip-body .addr {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .trip-meta {
      display: flex;
      gap: 0.75rem;
      margin-top: 0.35rem;
      font-size: 0.75rem;
    }
    .trip-meta .eta-label { color: #9980d0; font-weight: 500; }
    .trip-meta .eta-time  { color: #f0f0f0; }
    .access-icons {
      display: flex;
      gap: 0.3rem;
      margin-top: 0.35rem;
      flex-wrap: wrap;
    }
    .access-tag {
      background: #2a1f4a;
      color: #b0a0e0;
      font-size: 0.68rem;
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
    }
    .no-trips {
      text-align: center;
      color: #555;
      padding: 2rem 1rem;
      font-size: 0.85rem;
    }

    /* Duty roster */
    #duty-roster {
      grid-row: 2;
      grid-column: 1 / -1;
      background: #111;
      border-top: 1px solid #2a2a44;
    }
    #duty-roster h2 {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #9980d0;
      padding: 0.6rem 1rem;
      border-bottom: 1px solid #2a2a44;
      background: #16162a;
    }
    #duties-table-wrap {
      overflow-x: auto;
      max-height: 220px;
      overflow-y: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
    }
    th {
      background: #16162a;
      color: #9980d0;
      font-weight: 600;
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.5rem 1rem;
      text-align: left;
      border-bottom: 1px solid #2a2a44;
      position: sticky;
      top: 0;
    }
    td {
      padding: 0.45rem 1rem;
      border-bottom: 1px solid #1e1e32;
      color: #ddd;
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #1a1a2e; }
    .duty-status {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 0.15rem 0.45rem;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .duty-status.scheduled   { background: #1a237e; color: #90caf9; }
    .duty-status.inProgress  { background: #1b5e20; color: #a5d6a7; }
    .duty-status.completed   { background: #212121; color: #757575; }
    .duty-status.cancelled   { background: #b71c1c; color: #ef9a9a; }
    .no-duties {
      text-align: center;
      color: #555;
      padding: 1.5rem;
      font-size: 0.82rem;
    }

    @media (max-width: 900px) {
      .main-layout {
        grid-template-columns: 1fr;
        grid-template-rows: 50vh auto 1fr;
      }
      #map-pane { grid-column: 1; grid-row: 1; }
      #trip-board { grid-column: 1; grid-row: 3; border-left: none; border-top: 1px solid #2a2a44; }
      #duty-roster { grid-column: 1; grid-row: 2; }
    }

    /* ondemand-driver-popup (matches testmap style) */
    .leaflet-popup.ondemand-driver-popup .leaflet-popup-content-wrapper {
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 12px 30px rgba(15,23,42,0.25);
      color: #0f172a;
      font-family: "Inter","Segoe UI",system-ui,sans-serif;
      padding: 10px 14px;
      border: 2px solid rgba(35,45,75,0.08);
    }
    .leaflet-popup.ondemand-driver-popup .leaflet-popup-content { margin: 0; }
    .leaflet-popup.ondemand-driver-popup .leaflet-popup-tip {
      background: #ffffff;
      border: 2px solid rgba(35,45,75,0.08);
      box-shadow: 0 4px 12px rgba(15,23,42,0.25);
    }
    .ondemand-driver-popup__content {
      display: flex; flex-direction: column; gap: 4px; min-width: 160px;
    }
    .ondemand-driver-popup__section { display: flex; flex-direction: column; gap: 4px; }
    .ondemand-driver-popup__label {
      font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
      color: rgba(15,23,42,0.75);
    }
    .ondemand-driver-popup__value { font-size: 15px; font-weight: 700; color: #1f2937; }
    .ondemand-driver-popup__sub { font-size: 12px; color: #6b7280; margin-top: 2px; }
    .ondemand-driver-popup__sub { font-size: 12px; color: #6b7280; margin-top: 1px; }
    .ondemand-driver-popup__divider {
      height: 1px; width: 100%; background: rgba(35,45,75,0.12); margin: 6px 0;
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Van Dispatch</h1>
    </div>
    <span class="subtitle">Paratransit Operations</span>
  </header>

  <div id="status-bar">
    <div class="badge"><span class="dot" id="sse-dot"></span><span id="sse-label">connecting…</span></div>
    <div class="badge">Trips today: <strong id="trip-count">—</strong></div>
    <div class="badge">Duties: <strong id="duty-count">—</strong></div>
    <div class="badge" id="webhook-badge" style="display:none">
      <span class="dot warn"></span><span>Live GPS inactive — configure Spare webhook</span>
    </div>
    <div class="badge" style="margin-left:auto">
      <span id="last-refresh">—</span>
    </div>
  </div>

  <div class="main-layout">
    <div id="map-pane">
      <div id="map"></div>
      <div id="map-no-webhooks">Vehicle GPS requires Spare webhook configuration</div>
    </div>

    <div id="trip-board">
      <h2>Active Trips <span id="trips-updated"></span></h2>
      <div id="trips-list"><div class="no-trips">Loading…</div></div>
    </div>

    <div id="duty-roster">
      <h2>Duty Roster — Today</h2>
      <div id="duties-table-wrap">
        <table>
          <thead>
            <tr>
              <th>Driver</th>
              <th>Vehicle</th>
              <th>Status</th>
              <th>Shift</th>
              <th>ID</th>
            </tr>
          </thead>
          <tbody id="duties-tbody">
            <tr><td colspan="5" class="no-duties">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    // ---- Map init ----
    const map = L.map('map', { center: [38.0336, -78.5080], zoom: 13 });
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '© OpenStreetMap © CARTO',
      subdomains: 'abcd', maxZoom: 19,
    }).addTo(map);

    // ---- State ----
    const vehicleData    = {};  // vehicleId -> full vehicle object
    const dutiesData     = {};  // dutyId    -> full duty object
    const vehicleMarkers = {};  // vehicleId -> bus-body L.marker
    const bubbleMarkers  = {};  // vehicleId -> name bubble L.marker (above)
    const speedMarkers   = {};  // vehicleId -> speed bubble L.marker (below)

    // ---- Helpers ----
    function escHtml(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function fmtTime(ts) {
      if (!ts) return '—';
      return new Date(ts * 1000).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
    }

    // ---- Bubble icon (matches testmap createNameBubbleDivIcon) ----
    const _bubbleCanvas = document.createElement('canvas');
    function measureText(text, fontSize) {
      const ctx = _bubbleCanvas.getContext('2d');
      if (!ctx) return text.length * fontSize * 0.6;
      ctx.font = `bold ${fontSize}px "Inter","Segoe UI",system-ui,sans-serif`;
      return ctx.measureText(text).width;
    }

    function createBubbleIcon(text, fillColor) {
      const FONT = 14, H_PAD = 14, V_PAD = 3, STROKE = 3, INSET = 5;
      const tw = measureText(text, FONT);
      const rw = Math.max(40, tw + H_PAD * 2);
      const rh = Math.max(20, FONT + V_PAD * 2);
      // Corner radius = half height → pill shape (matches testmap NAME_BUBBLE_CORNER_RADIUS=10 on min-height 20)
      const CORNER = rh / 2;
      const sw = rw + STROKE * 2;
      const sh = rh + INSET * 2 + STROKE;
      const anchorX = sw / 2;
      const anchorY = sh + 44 + 5;
      const rx = STROKE, ry = INSET + STROKE / 2;
      const tx = sw / 2, ty = ry + rh / 2 + FONT * 0.06;
      const svg = `<svg width="${sw}" height="${sh}" viewBox="0 0 ${sw} ${sh}" xmlns="http://www.w3.org/2000/svg" style="pointer-events:none">
        <rect x="${rx}" y="${ry}" width="${rw}" height="${rh}" rx="${CORNER}" ry="${CORNER}" fill="${fillColor}" stroke="white" stroke-width="${STROKE}"/>
        <text x="${tx}" y="${ty}" text-anchor="middle" dominant-baseline="middle" font-size="${FONT}" font-weight="bold" fill="white" font-family="Inter,Segoe UI,system-ui,sans-serif">${escHtml(text)}</text>
      </svg>`;
      return L.divIcon({ html: svg, className: 'leaflet-div-icon bus-label-icon', iconSize: [sw, sh], iconAnchor: [anchorX, anchorY] });
    }

    // ---- Speed bubble icon (below marker, matches testmap createSpeedBubbleDivIcon) ----
    function createSpeedBubbleIcon(speedMph, fillColor) {
      const FONT = 12, H_PAD = 12, V_PAD = 4, STROKE = 3;
      const label = `${Math.round(Math.max(0, speedMph))} MPH`;
      const tw = measureText(label, FONT);
      const rw = Math.max(60, tw + H_PAD * 2);
      const rh = Math.max(20, FONT + V_PAD * 2);
      const CORNER = rh / 2;  // pill
      const sw = rw + STROKE * 2;
      const sh = rh + STROKE * 2;
      // anchorY negative → icon top sits below the geographic point (pin tip), giving a gap
      const svg = `<svg width="${sw}" height="${sh}" viewBox="0 0 ${sw} ${sh}" xmlns="http://www.w3.org/2000/svg" style="pointer-events:none">
        <rect x="${STROKE}" y="${STROKE}" width="${rw}" height="${rh}" rx="${CORNER}" ry="${CORNER}" fill="${fillColor}" stroke="white" stroke-width="${STROKE}"/>
        <text x="${sw/2}" y="${sh/2}" text-anchor="middle" dominant-baseline="middle" font-size="${FONT}" font-weight="bold" fill="white" font-family="Inter,Segoe UI,system-ui,sans-serif">${escHtml(label)}</text>
      </svg>`;
      return L.divIcon({ html: svg, className: 'leaflet-div-icon bus-label-icon', iconSize: [sw, sh], iconAnchor: [sw / 2, -8] });
    }

    // ---- Bus-body marker icon ----
    function makeBusMarkerIcon(bearing) {
      const fill = '#7c3aed';
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52.99 86.99" width="26" height="44"
          style="transform:rotate(${bearing}deg);transform-origin:50% 50%;display:block">
        <path d="M26.49,0c1.56,0,3.11.52,4.38,1.55,3.68,2.93,22.12,18.71,22.12,39.94,0,17.84-13.46,28.5-26.49,28.5S0,59.33,0,41.49C0,20.26,18.44,4.48,22.14,1.54,23.4.52,24.94.01,26.49.01h0Z" fill="#fff"/>
        <path d="M26.5,67.49c-11.5,0-24-9.5-24-26C2.5,23.99,16.3,9.39,23.7,3.49c1.6-1.3,4-1.3,5.6,0,7.4,5.9,21.2,20.5,21.2,38,0,16.5-12.5,26-24,26Z" fill="${fill}"/>
        <path d="M26.5,27.99c8.55,0,15.5,6.95,15.5,15.5s-6.95,15.5-15.5,15.5-15.5-6.95-15.5-15.5,6.95-15.5,15.5-15.5ZM26.5,52.49c4.97,0,9-4.03,9-9s-4.03-9-9-9-9,4.03-9,9,4.03,9,9,9Z" fill="#fff"/>
        <path d="M26.5,8.49l10,18c-6.67-4-13.33-4-20,0l10-18Z" fill="#fff"/>
      </svg>`;
      return L.divIcon({ html: svg, className: '', iconSize: [26, 44], iconAnchor: [13, 44] });
    }

    // ---- Status display helpers ----
    const STATUS_LABELS = { inProgress: 'In Progress', scheduled: 'Scheduled', completed: 'Completed', cancelled: 'Cancelled' };
    const STATUS_COLORS = { inProgress: '#16a34a', scheduled: '#2563eb', completed: '#6b7280', cancelled: '#dc2626' };
    function humanizeStatus(s) { return STATUS_LABELS[s] || s || '—'; }
    function statusColor(s) { return STATUS_COLORS[s] || '#9ca3af'; }

    // ---- Popup content (ondemand-driver-popup style) ----
    function buildPopupHtml(vid) {
      const v = vehicleData[vid] || {};
      const loc = v.currentLocation || {};
      const duty = dutiesData[loc.dutyId] || {};
      const driver = duty.driver || {};

      const vehName = v.identifier || 'Van';
      const vehSub = [v.make, v.model, v.color, v.licensePlate].filter(Boolean).join(' · ');
      const driverName = [driver.firstName, driver.lastName].filter(Boolean).join(' ') || '—';
      const shift = duty.startRequestedTs
        ? `${fmtTime(duty.startRequestedTs)} – ${fmtTime(duty.endRequestedTs)}`
        : null;
      const rawStatus = duty.status || null;

      const sections = [
        `<div class="ondemand-driver-popup__section">
          <div class="ondemand-driver-popup__label">Vehicle</div>
          <div class="ondemand-driver-popup__value">${escHtml(vehName)}</div>
          ${vehSub ? `<div class="ondemand-driver-popup__sub">${escHtml(vehSub)}</div>` : ''}
        </div>`,
        `<div class="ondemand-driver-popup__section">
          <div class="ondemand-driver-popup__label">Driver</div>
          <div class="ondemand-driver-popup__value">${escHtml(driverName)}</div>
          ${shift ? `<div class="ondemand-driver-popup__sub">${escHtml(shift)}</div>` : ''}
        </div>`,
        rawStatus ? `<div class="ondemand-driver-popup__section">
          <div class="ondemand-driver-popup__label">Duty Status</div>
          <div class="ondemand-driver-popup__value" style="display:flex;align-items:center;gap:6px">
            <span style="width:8px;height:8px;border-radius:50%;background:${statusColor(rawStatus)};flex-shrink:0;display:inline-block;box-shadow:0 0 4px ${statusColor(rawStatus)}66"></span>
            ${escHtml(humanizeStatus(rawStatus))}
          </div>
        </div>` : null,
      ].filter(Boolean);

      return `<div class="ondemand-driver-popup__content">
        ${sections.join('<div class="ondemand-driver-popup__divider"></div>')}
      </div>`;
    }

    const POPUP_OPTS = {
      className: 'ondemand-driver-popup',
      closeButton: false,
      autoClose: true,
      autoPan: false,
      offset: [0, -20],
    };

    // ---- Upsert van marker (bus body + bubble label) ----
    function upsertVehicleMarker(locData) {
      const loc = locData.location;
      if (!loc || !loc.coordinates) return;
      const [lng, lat] = loc.coordinates;
      const vid = locData.vehicleId;
      const bearing = locData.bearing ?? 0;

      // Keep vehicleData location in sync so popup can read it
      if (vehicleData[vid]) vehicleData[vid].currentLocation = locData;

      const v = vehicleData[vid] || {};
      const label = v.identifier || 'Van';
      const busIcon    = makeBusMarkerIcon(bearing);
      const bubbleIcon = createBubbleIcon(label, '#7c3aed');
      const popupHtml  = buildPopupHtml(vid);

      if (vehicleMarkers[vid]) {
        vehicleMarkers[vid].setLatLng([lat, lng]).setIcon(busIcon).setPopupContent(popupHtml);
        bubbleMarkers[vid].setLatLng([lat, lng]).setIcon(bubbleIcon);
      } else {
        vehicleMarkers[vid] = L.marker([lat, lng], { icon: busIcon })
          .bindPopup(popupHtml, POPUP_OPTS)
          .addTo(map);
        bubbleMarkers[vid] = L.marker([lat, lng], { icon: bubbleIcon, interactive: false }).addTo(map);
      }

      // Speed bubble — show if Spare provides speed in the location payload (m/s → mph)
      const rawSpeedMs = locData.speed ?? locData.groundSpeed ?? locData.speedMs ?? null;
      const speedMph = rawSpeedMs != null ? rawSpeedMs * 2.23694 : null;
      if (speedMph != null && speedMph >= 0) {
        const speedIcon = createSpeedBubbleIcon(speedMph, '#7c3aed');
        if (speedMarkers[vid]) {
          speedMarkers[vid].setLatLng([lat, lng]).setIcon(speedIcon);
        } else {
          speedMarkers[vid] = L.marker([lat, lng], { icon: speedIcon, interactive: false }).addTo(map);
        }
      } else if (speedMarkers[vid]) {
        map.removeLayer(speedMarkers[vid]);
        delete speedMarkers[vid];
      }
    }

    // ---- Load vehicle roster (populates vehicleData + initial map pins) ----
    async function loadVehicleIdents() {
      try {
        const res = await fetch('/api/spare/vehicles');
        if (!res.ok) return;
        const vehicles = await res.json();
        (Array.isArray(vehicles) ? vehicles : []).forEach(v => {
          if (!v.id) return;
          vehicleData[v.id] = v;
          if (v.currentLocation) upsertVehicleMarker({ ...v.currentLocation, vehicleId: v.id });
        });
      } catch (e) { /* ignore */ }
    }

    // ---- SSE ----
    const sseDot   = document.getElementById('sse-dot');
    const sseLabel = document.getElementById('sse-label');

    function connectSSE() {
      const es = new EventSource('/stream/spare');
      es.onopen = () => { sseDot.className = 'dot live'; sseLabel.textContent = 'Live'; };
      es.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'initial') {
          (msg.data.vehicleLocations || []).forEach(upsertVehicleMarker);
          if (!msg.data.webhookConfigured) {
            document.getElementById('webhook-badge').style.display = '';
            document.getElementById('map-no-webhooks').style.display = 'block';
          }
        } else if (msg.type === 'vehicleLocation') {
          upsertVehicleMarker(msg.data);
          document.getElementById('map-no-webhooks').style.display = 'none';
          document.getElementById('webhook-badge').style.display = 'none';
        } else if (msg.type === 'requestStatus') {
          fetchTrips();
        }
      };
      es.onerror = () => {
        sseDot.className = 'dot off';
        sseLabel.textContent = 'Disconnected — reconnecting…';
        es.close();
        setTimeout(connectSSE, 5000);
      };
    }
    connectSSE();

    // ---- Trip board ----
    const STATUS_ORDER = { arriving: 0, inProgress: 1, accepted: 2, processing: 3 };

    function riderName(req) {
      const r = req.rider;
      if (!r) return 'Rider';
      return [r.firstName, r.lastName].filter(Boolean).join(' ') || 'Rider';
    }

    function accessTags(req) {
      const features = req.accessibilityFeatures || [];
      if (!features.length) return '';
      return features.map(f => {
        const label = typeof f === 'object' ? (f.type || JSON.stringify(f)) : f;
        return `<span class="access-tag">${escHtml(label)}</span>`;
      }).join('');
    }

    function renderTrips(trips) {
      const list = document.getElementById('trips-list');
      document.getElementById('trip-count').textContent = trips.length;
      document.getElementById('trips-updated').textContent = new Date().toLocaleTimeString();
      if (!trips.length) { list.innerHTML = '<div class="no-trips">No active trips right now</div>'; return; }
      const sorted = [...trips].sort((a,b) => (STATUS_ORDER[a.status]??9)-(STATUS_ORDER[b.status]??9));
      list.innerHTML = sorted.map(req => {
        const name   = riderName(req);
        const status = req.status || 'unknown';
        const pickup  = req.scheduledPickupAddress  || req.requestedPickupAddress  || '—';
        const dropoff = req.scheduledDropoffAddress || req.requestedDropoffAddress || '—';
        const puEta = req.pickupEta  ? fmtTime(req.pickupEta)  : fmtTime(req.scheduledPickupTs);
        const doEta = req.dropoffEta ? fmtTime(req.dropoffEta) : fmtTime(req.scheduledDropoffTs);
        const notes  = req.notes ? `<div class="addr" style="color:#ffd54f;margin-top:.25rem">📝 ${escHtml(req.notes)}</div>` : '';
        const riders = req.numRiders ? ` · ${req.numRiders} rider${req.numRiders>1?'s':''}` : '';
        return `<div class="trip-card ${status}">
          <div class="trip-header">
            <span class="status-pill ${status}">${status}</span>
            <span class="rider-name">${escHtml(name)}${riders}</span>
          </div>
          <div class="trip-body">
            <div class="addr">▲ ${escHtml(pickup)}</div>
            <div class="addr">▼ ${escHtml(dropoff)}</div>
            <div class="trip-meta">
              <span><span class="eta-label">PU</span> <span class="eta-time">${puEta}</span></span>
              <span><span class="eta-label">DO</span> <span class="eta-time">${doEta}</span></span>
            </div>
            ${notes}
            <div class="access-icons">${accessTags(req)}</div>
          </div>
        </div>`;
      }).join('');
    }

    async function fetchTrips() {
      try {
        const res = await fetch('/api/spare/requests');
        if (!res.ok) {
          if (res.status === 503) {
            document.getElementById('trips-list').innerHTML = '<div class="no-trips">⚠ Spare not configured — set SPARE_API_KEY</div>';
            return;
          }
          throw new Error(res.statusText);
        }
        const trips = await res.json();
        renderTrips(Array.isArray(trips) ? trips : []);
      } catch (err) {
        console.error('trips fetch failed:', err);
        document.getElementById('trips-list').innerHTML = `<div class="no-trips">Error: ${err.message}</div>`;
      }
    }

    // ---- Duty roster ----
    function renderDuties(duties) {
      const tbody = document.getElementById('duties-tbody');
      document.getElementById('duty-count').textContent = duties.length;
      if (!duties.length) {
        tbody.innerHTML = '<tr><td colspan="5" class="no-duties">No active duties right now</td></tr>';
        return;
      }
      tbody.innerHTML = duties.map(d => {
        const status      = d.status || 'unknown';
        const driver      = d.driver || {};
        const driverName  = [driver.firstName, driver.lastName].filter(Boolean).join(' ') || '—';
        const vehName     = (d.vehicle && d.vehicle.identifier) || (vehicleData[d.vehicleId] && vehicleData[d.vehicleId].identifier) || '—';
        const shift       = `${fmtTime(d.startRequestedTs)} – ${fmtTime(d.endRequestedTs)}`;
        return `<tr>
          <td>${escHtml(driverName)}</td>
          <td>${escHtml(vehName)}</td>
          <td><span class="duty-status ${status}">${status}</span></td>
          <td>${escHtml(shift)}</td>
          <td style="color:#888;font-size:.75rem">${escHtml(d.identifier || '—')}</td>
        </tr>`;
      }).join('');
    }

    async function fetchDuties() {
      try {
        const res = await fetch('/api/spare/duties');
        if (!res.ok) return;
        const dutiesJson = await res.json();
        const duties = Array.isArray(dutiesJson) ? dutiesJson : [];
        // Cache duties by ID for popup lookups
        duties.forEach(d => { if (d.id) dutiesData[d.id] = d; });
        renderDuties(duties);
        // Refresh open/existing marker popups with latest duty info
        Object.keys(vehicleMarkers).forEach(vid => vehicleMarkers[vid].setPopupContent(buildPopupHtml(vid)));
      } catch (err) {
        console.error('duties fetch failed:', err);
      }
    }

    // ---- Last refresh ----
    function updateLastRefresh() {
      document.getElementById('last-refresh').textContent = 'Updated ' + new Date().toLocaleTimeString();
    }

    // ---- Initial load + polling ----
    loadVehicleIdents();
    fetchTrips();
    fetchDuties();
    updateLastRefresh();

    setInterval(() => { fetchTrips(); updateLastRefresh(); }, 30_000);
    setInterval(fetchDuties, 60_000);
    setInterval(loadVehicleIdents, 120_000);
  </script>
</body>
</html>
