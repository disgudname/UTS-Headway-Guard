<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/media/favicon.ico" />
  <link rel="apple-touch-icon" sizes="120x120" href="/media/apple-touch-icon-120.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="/media/apple-touch-icon-152.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/media/apple-touch-icon-180.png" />
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#E57200">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Van Dispatch</title>
  <script defer src="/nav-bar.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Inter", "Segoe UI", system-ui, sans-serif;
      background: #0d0d0d;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: linear-gradient(120deg, #1a0a3d, #0f0820);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      border-bottom: 2px solid #6c3fc5;
    }
    header h1 {
      font-size: 1.3rem;
      font-weight: 700;
      color: #e0d0ff;
      letter-spacing: 0.02em;
    }
    header .subtitle {
      font-size: 0.8rem;
      color: #9980d0;
      margin-left: auto;
    }
    #status-bar {
      background: #1a1a2e;
      padding: 0.4rem 1.5rem;
      font-size: 0.78rem;
      color: #888;
      border-bottom: 1px solid #2a2a44;
      display: flex;
      gap: 1.5rem;
      align-items: center;
    }
    #status-bar .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #555;
      display: inline-block;
    }
    .dot.live { background: #4caf50; box-shadow: 0 0 6px #4caf5099; }
    .dot.warn { background: #ff9800; }
    .dot.off  { background: #f44336; }

    .main-layout {
      display: grid;
      grid-template-columns: 1fr 420px;
      grid-template-rows: 1fr auto;
      flex: 1;
      min-height: 0;
    }
    /* Map */
    #map-pane {
      grid-row: 1;
      grid-column: 1;
      position: relative;
    }
    #map {
      width: 100%;
      height: 100%;
      min-height: 400px;
      background: #111;
    }
    #map-no-webhooks {
      display: none;
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.75);
      color: #ffd54f;
      font-size: 0.75rem;
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      pointer-events: none;
      white-space: nowrap;
    }

    /* Trip board */
    #trip-board {
      grid-row: 1;
      grid-column: 2;
      display: flex;
      flex-direction: column;
      background: #111;
      border-left: 1px solid #2a2a44;
      overflow: hidden;
    }
    #trip-board h2 {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #9980d0;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #2a2a44;
      background: #16162a;
    }
    #trip-board h2 span {
      float: right;
      font-size: 0.75rem;
      color: #666;
      font-weight: 400;
      letter-spacing: 0;
      text-transform: none;
    }
    #trips-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem;
    }
    .trip-card {
      background: #1a1a2e;
      border: 1px solid #2a2a44;
      border-radius: 8px;
      padding: 0.7rem 0.8rem;
      margin-bottom: 0.5rem;
      transition: border-color 0.2s;
    }
    .trip-card:hover { border-color: #6c3fc5; }
    .trip-card.arriving { border-left: 3px solid #ff9800; }
    .trip-card.inProgress { border-left: 3px solid #4caf50; }
    .trip-card.accepted { border-left: 3px solid #2196f3; }
    .trip-card.processing { border-left: 3px solid #9e9e9e; }
    .trip-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.4rem;
    }
    .status-pill {
      font-size: 0.68rem;
      font-weight: 600;
      padding: 0.15rem 0.45rem;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .status-pill.processing { background: #333; color: #aaa; }
    .status-pill.accepted   { background: #1565c0; color: #90caf9; }
    .status-pill.arriving   { background: #e65100; color: #ffe0b2; }
    .status-pill.inProgress { background: #1b5e20; color: #a5d6a7; }
    .rider-name {
      font-size: 0.9rem;
      font-weight: 600;
      color: #e0d0ff;
      flex: 1;
    }
    .trip-body {
      font-size: 0.78rem;
      color: #aaa;
      line-height: 1.5;
    }
    .trip-body .addr {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .trip-meta {
      display: flex;
      gap: 0.75rem;
      margin-top: 0.35rem;
      font-size: 0.75rem;
    }
    .trip-meta .eta-label { color: #9980d0; font-weight: 500; }
    .trip-meta .eta-time  { color: #f0f0f0; }
    .access-icons {
      display: flex;
      gap: 0.3rem;
      margin-top: 0.35rem;
      flex-wrap: wrap;
    }
    .access-tag {
      background: #2a1f4a;
      color: #b0a0e0;
      font-size: 0.68rem;
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
    }
    .no-trips {
      text-align: center;
      color: #555;
      padding: 2rem 1rem;
      font-size: 0.85rem;
    }

    /* Duty roster */
    #duty-roster {
      grid-row: 2;
      grid-column: 1 / -1;
      background: #111;
      border-top: 1px solid #2a2a44;
    }
    #duty-roster h2 {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #9980d0;
      padding: 0.6rem 1rem;
      border-bottom: 1px solid #2a2a44;
      background: #16162a;
    }
    #duties-table-wrap {
      overflow-x: auto;
      max-height: 220px;
      overflow-y: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
    }
    th {
      background: #16162a;
      color: #9980d0;
      font-weight: 600;
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.5rem 1rem;
      text-align: left;
      border-bottom: 1px solid #2a2a44;
      position: sticky;
      top: 0;
    }
    td {
      padding: 0.45rem 1rem;
      border-bottom: 1px solid #1e1e32;
      color: #ddd;
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #1a1a2e; }
    .duty-status {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 0.15rem 0.45rem;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .duty-status.scheduled   { background: #1a237e; color: #90caf9; }
    .duty-status.inProgress  { background: #1b5e20; color: #a5d6a7; }
    .duty-status.completed   { background: #212121; color: #757575; }
    .duty-status.cancelled   { background: #b71c1c; color: #ef9a9a; }
    .no-duties {
      text-align: center;
      color: #555;
      padding: 1.5rem;
      font-size: 0.82rem;
    }

    @media (max-width: 900px) {
      .main-layout {
        grid-template-columns: 1fr;
        grid-template-rows: 50vh auto 1fr;
      }
      #map-pane { grid-column: 1; grid-row: 1; }
      #trip-board { grid-column: 1; grid-row: 3; border-left: none; border-top: 1px solid #2a2a44; }
      #duty-roster { grid-column: 1; grid-row: 2; }
    }

    /* ondemand-driver-popup (matches testmap style) */
    .leaflet-popup.ondemand-driver-popup .leaflet-popup-content-wrapper {
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 12px 30px rgba(15,23,42,0.25);
      color: #0f172a;
      font-family: "Inter","Segoe UI",system-ui,sans-serif;
      padding: 10px 14px;
      border: 2px solid rgba(35,45,75,0.08);
    }
    .leaflet-popup.ondemand-driver-popup .leaflet-popup-content { margin: 0; }
    .leaflet-popup.ondemand-driver-popup .leaflet-popup-tip {
      background: #ffffff;
      border: 2px solid rgba(35,45,75,0.08);
      box-shadow: 0 4px 12px rgba(15,23,42,0.25);
    }
    .ondemand-driver-popup__content {
      display: flex; flex-direction: column; gap: 4px; min-width: 160px;
    }
    .ondemand-driver-popup__section { display: flex; flex-direction: column; gap: 4px; }
    .ondemand-driver-popup__label {
      font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
      color: rgba(15,23,42,0.75);
    }
    .ondemand-driver-popup__value { font-size: 15px; font-weight: 700; color: #1f2937; }
    .ondemand-driver-popup__sub { font-size: 12px; color: #6b7280; margin-top: 2px; }
    /* Source badges in duty table */
    .source-badge {
      font-size: 0.65rem; font-weight: 700; padding: 0.1rem 0.35rem;
      border-radius: 3px; letter-spacing: 0.06em; text-transform: uppercase; vertical-align: middle;
    }
    .source-badge--spare { background: #2a1f4a; color: #b0a0e0; }
    .source-badge--w2w   { background: #142a1e; color: #6ee7b7; }
    /* Strip Leaflet's default white-box styling from SVG label icons */
    .bus-label-icon {
      pointer-events: none !important;
      background: transparent !important;
      border: none !important;
    }
    .ondemand-driver-popup__divider {
      height: 1px; width: 100%; background: rgba(35,45,75,0.12); margin: 6px 0;
    }
    /* Info-card section (matches testmap buildInfoCardSection) */
    .bus-popup__drivers-list { display: flex; flex-direction: column; gap: 10px; }
    .bus-popup__driver-row {
      display: flex; flex-direction: column; gap: 4px; padding: 8px 10px; border-radius: 8px;
      background: rgba(35,45,75,0.04); border: 1px solid rgba(35,45,75,0.08);
    }
    .bus-popup__info-card { border-left: 3px solid; }
    .bus-popup__info-line { line-height: 1.4; }
    .bus-popup__info-line--route { font-size: 14px; font-weight: 700; color: #1f2937; }
    .bus-popup__info-line--block { font-size: 12px; font-weight: 600; color: #4b5563; }
    .bus-popup__info-line--meta  { font-size: 12px; font-weight: 500; color: #6b7280; }
    /* Ride cards (matches testmap renderOnDemandStopList) */
    .ondemand-driver-popup__stops { display: flex; flex-direction: column; gap: 6px; }
    .ondemand-driver-popup__rides { display: flex; flex-direction: column; gap: 10px; }
    .ondemand-driver-popup__ride-card {
      background: rgba(35,45,75,0.06); border: 1px solid rgba(35,45,75,0.12);
      border-radius: 12px; padding: 12px 14px; display: flex; flex-direction: column; gap: 8px;
    }
    .ondemand-driver-popup__ride-header { display: flex; justify-content: space-between; align-items: center; }
    .ondemand-driver-popup__ride-name { font-weight: 700; font-size: 15px; color: #1f2937; }
    .ondemand-driver-popup__ride-order {
      font-weight: 700; font-size: 12px; color: #6b7280;
      background: rgba(35,45,75,0.12); padding: 3px 8px; border-radius: 999px;
    }
    .ondemand-driver-popup__ride-locations { display: flex; flex-direction: column; gap: 6px; font-size: 13px; }
    .ondemand-driver-popup__ride-location { display: flex; align-items: flex-start; gap: 8px; }
    .ondemand-driver-popup__ride-location-icon {
      flex-shrink: 0; width: 20px; height: 20px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700;
    }
    .ondemand-driver-popup__ride-location-icon--pickup  { background: #4ade80; color: #052e16; }
    .ondemand-driver-popup__ride-location-icon--dropoff { background: #f87171; color: #450a0a; }
    .ondemand-driver-popup__ride-location-icon--onboard { background: #60a5fa; color: #1e3a5f; }
    .ondemand-driver-popup__ride-location-text { flex: 1; color: #374151; line-height: 1.4; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Van Dispatch</h1>
    </div>
    <span class="subtitle">OnDemand &amp; FlexRide</span>
  </header>

  <div id="status-bar">
    <div class="badge"><span class="dot" id="sse-dot"></span><span id="sse-label">connecting…</span></div>
    <div class="badge">Trips today: <strong id="trip-count">—</strong></div>
    <div class="badge">Duties: <strong id="duty-count">—</strong></div>
    <div class="badge">OnDemand: <strong id="od-count">—</strong></div>
    <div class="badge" id="webhook-badge" style="display:none">
      <span class="dot warn"></span><span>Live GPS inactive — configure Spare webhook</span>
    </div>
    <div class="badge" style="margin-left:auto">
      <span id="last-refresh">—</span>
    </div>
  </div>

  <div class="main-layout">
    <div id="map-pane">
      <div id="map"></div>
      <div id="map-no-webhooks">Vehicle GPS requires Spare webhook configuration</div>
    </div>

    <div id="trip-board">
      <h2>Active Trips <span id="trips-updated"></span></h2>
      <div id="trips-list"><div class="no-trips">Loading…</div></div>
    </div>

    <div id="duty-roster">
      <h2>Duty Roster — Today</h2>
      <div id="duties-table-wrap">
        <table>
          <thead>
            <tr>
              <th>Driver</th>
              <th>Assignment</th>
              <th>Status</th>
              <th>Shift</th>
              <th>Source</th>
            </tr>
          </thead>
          <tbody id="duties-tbody">
            <tr><td colspan="5" class="no-duties">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    // ---- Map init ----
    const map = L.map('map', { center: [38.0336, -78.5080], zoom: 13 });
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '© OpenStreetMap © CARTO',
      subdomains: 'abcd', maxZoom: 19,
    }).addTo(map);

    // ---- State ----
    const vehicleData    = {};  // vehicleId -> full vehicle object (Spare)
    const dutiesData     = {};  // dutyId    -> full duty object (Spare)
    const vehicleMarkers = {};  // vehicleId -> bus-body L.marker (Spare, keyed by Spare vehicleId)
    const bubbleMarkers  = {};  // vehicleId -> name bubble L.marker (above)
    const speedMarkers   = {};  // vehicleId -> speed bubble L.marker (below)
    // OnDemand markers are keyed "od_<vehicleId>" to avoid collision with Spare
    const odVehicleMarkers = {};
    const odBubbleMarkers  = {};
    const odSpeedMarkers   = {};

    // ---- Helpers ----
    function escHtml(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Parse OnDemand callName — always "VAN XX:" or "CAR XX:", strip colon + suffix, title-case prefix
    function parseOdCallName(raw) {
      if (!raw) return raw;
      const name = raw.split(':')[0].trim();
      return name.replace(/^([A-Za-z]+)/, m => m.charAt(0).toUpperCase() + m.slice(1).toLowerCase());
    }

    // ---- Van color config (shared across Spare + OnDemand) ----
    let vanColors = {};  // { "Van 16": "#hex", ... }

    function getVanColor(displayName, fallback) {
      return (displayName && vanColors[displayName]) || fallback;
    }

    async function loadVanColors() {
      try {
        const res = await fetch('/api/van-colors');
        if (res.ok) vanColors = await res.json();
      } catch (_) { /* soft-fail */ }
    }

    // Contrast text color (black or white) based on fill luminance — matches testmap
    function contrastColor(hex) {
      const h = (hex || '#000000').replace('#', '');
      if (h.length !== 6) return '#ffffff';
      const r = parseInt(h.slice(0,2),16)/255;
      const g = parseInt(h.slice(2,4),16)/255;
      const b = parseInt(h.slice(4,6),16)/255;
      const L = 0.2126*r + 0.7152*g + 0.0722*b;
      return L > 0.55 ? '#000000' : '#ffffff';
    }

    function fmtTime(ts) {
      if (!ts) return '—';
      return new Date(ts * 1000).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
    }

    // ---- Bubble icon (matches testmap createNameBubbleDivIcon) ----
    const _bubbleCanvas = document.createElement('canvas');
    function measureText(text, fontSize) {
      const ctx = _bubbleCanvas.getContext('2d');
      if (!ctx) return text.length * fontSize * 0.6;
      ctx.font = `bold ${fontSize}px "Inter","Segoe UI",system-ui,sans-serif`;
      return ctx.measureText(text).width;
    }

    function createBubbleIcon(text, fillColor) {
      const FONT = 14, H_PAD = 14, V_PAD = 3, STROKE = 3, INSET = 5;
      const tw = measureText(text, FONT);
      const rw = Math.max(40, tw + H_PAD * 2);
      const rh = Math.max(20, FONT + V_PAD * 2);
      // Corner radius = half height → pill shape (matches testmap NAME_BUBBLE_CORNER_RADIUS=10 on min-height 20)
      const CORNER = rh / 2;
      const sw = rw + STROKE * 2;
      const sh = rh + INSET * 2 + STROKE;
      const anchorX = sw / 2;
      const anchorY = sh + 44 + 5;
      const rx = STROKE, ry = INSET + STROKE / 2;
      const tx = sw / 2, ty = ry + rh / 2 + FONT * 0.06;
      const textColor = contrastColor(fillColor);
      const svg = `<svg width="${sw}" height="${sh}" viewBox="0 0 ${sw} ${sh}" xmlns="http://www.w3.org/2000/svg" style="pointer-events:none">
        <rect x="${rx}" y="${ry}" width="${rw}" height="${rh}" rx="${CORNER}" ry="${CORNER}" fill="${fillColor}" stroke="white" stroke-width="${STROKE}"/>
        <text x="${tx}" y="${ty}" text-anchor="middle" dominant-baseline="middle" font-size="${FONT}" font-weight="bold" fill="${textColor}" font-family="Inter,Segoe UI,system-ui,sans-serif">${escHtml(text)}</text>
      </svg>`;
      return L.divIcon({ html: svg, className: 'leaflet-div-icon bus-label-icon', iconSize: [sw, sh], iconAnchor: [anchorX, anchorY] });
    }

    // ---- Speed bubble icon (below marker, matches testmap createSpeedBubbleDivIcon) ----
    function createSpeedBubbleIcon(speedMph, fillColor) {
      const FONT = 12, H_PAD = 12, V_PAD = 4, STROKE = 3;
      const label = `${Math.round(Math.max(0, speedMph))} MPH`;
      const tw = measureText(label, FONT);
      const rw = Math.max(60, tw + H_PAD * 2);
      const rh = Math.max(20, FONT + V_PAD * 2);
      const CORNER = rh / 2;  // pill
      const sw = rw + STROKE * 2;
      const sh = rh + STROKE * 2;
      // anchorY negative → icon top sits below the geographic point (pin tip), giving a gap
      const textColor = contrastColor(fillColor);
      const svg = `<svg width="${sw}" height="${sh}" viewBox="0 0 ${sw} ${sh}" xmlns="http://www.w3.org/2000/svg" style="pointer-events:none">
        <rect x="${STROKE}" y="${STROKE}" width="${rw}" height="${rh}" rx="${CORNER}" ry="${CORNER}" fill="${fillColor}" stroke="white" stroke-width="${STROKE}"/>
        <text x="${sw/2}" y="${sh/2}" text-anchor="middle" dominant-baseline="middle" font-size="${FONT}" font-weight="bold" fill="${textColor}" font-family="Inter,Segoe UI,system-ui,sans-serif">${escHtml(label)}</text>
      </svg>`;
      return L.divIcon({ html: svg, className: 'leaflet-div-icon bus-label-icon', iconSize: [sw, sh], iconAnchor: [sw / 2, -8] });
    }

    // ---- Bus-body marker icon ----
    function makeBusMarkerIcon(bearing, fillColor = '#7c3aed') {
      const fill = fillColor;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52.99 86.99" width="26" height="44"
          style="transform:rotate(${bearing}deg);transform-origin:50% 50%;display:block">
        <path d="M26.49,0c1.56,0,3.11.52,4.38,1.55,3.68,2.93,22.12,18.71,22.12,39.94,0,17.84-13.46,28.5-26.49,28.5S0,59.33,0,41.49C0,20.26,18.44,4.48,22.14,1.54,23.4.52,24.94.01,26.49.01h0Z" fill="#fff"/>
        <path d="M26.5,67.49c-11.5,0-24-9.5-24-26C2.5,23.99,16.3,9.39,23.7,3.49c1.6-1.3,4-1.3,5.6,0,7.4,5.9,21.2,20.5,21.2,38,0,16.5-12.5,26-24,26Z" fill="${fill}"/>
        <path d="M26.5,27.99c8.55,0,15.5,6.95,15.5,15.5s-6.95,15.5-15.5,15.5-15.5-6.95-15.5-15.5,6.95-15.5,15.5-15.5ZM26.5,52.49c4.97,0,9-4.03,9-9s-4.03-9-9-9-9,4.03-9,9,4.03,9,9,9Z" fill="#fff"/>
        <path d="M26.5,8.49l10,18c-6.67-4-13.33-4-20,0l10-18Z" fill="#fff"/>
      </svg>`;
      return L.divIcon({ html: svg, className: '', iconSize: [26, 44], iconAnchor: [13, 44] });
    }

    // ---- Status display helpers ----
    const STATUS_LABELS = { inProgress: 'In Progress', scheduled: 'Scheduled', completed: 'Completed', cancelled: 'Cancelled' };
    const STATUS_COLORS = { inProgress: '#16a34a', scheduled: '#2563eb', completed: '#6b7280', cancelled: '#dc2626' };
    function humanizeStatus(s) { return STATUS_LABELS[s] || s || '—'; }
    function statusColor(s) { return STATUS_COLORS[s] || '#9ca3af'; }

    // ---- Popup content (ondemand-driver-popup style) ----
    function buildPopupHtml(vid) {
      const v = vehicleData[vid] || {};
      const loc = v.currentLocation || {};
      const duty = dutiesData[loc.dutyId] || {};
      const driver = duty.driver || {};

      const vehName = v.identifier || 'Van';
      const vehSub = [v.make, v.model, v.color, v.licensePlate].filter(Boolean).join(' · ');
      const driverName = [driver.firstName, driver.lastName].filter(Boolean).join(' ') || '—';
      const shift = duty.startRequestedTs
        ? `${fmtTime(duty.startRequestedTs)} – ${fmtTime(duty.endRequestedTs)}`
        : null;
      const rawStatus = duty.status || null;

      const sections = [
        `<div class="ondemand-driver-popup__section">
          <div class="ondemand-driver-popup__label">Vehicle</div>
          <div class="ondemand-driver-popup__value">${escHtml(vehName)}</div>
          ${vehSub ? `<div class="ondemand-driver-popup__sub">${escHtml(vehSub)}</div>` : ''}
        </div>`,
        `<div class="ondemand-driver-popup__section">
          <div class="ondemand-driver-popup__label">Driver</div>
          <div class="ondemand-driver-popup__value">${escHtml(driverName)}</div>
          ${shift ? `<div class="ondemand-driver-popup__sub">${escHtml(shift)}</div>` : ''}
        </div>`,
        rawStatus ? `<div class="ondemand-driver-popup__section">
          <div class="ondemand-driver-popup__label">Duty Status</div>
          <div class="ondemand-driver-popup__value" style="display:flex;align-items:center;gap:6px">
            <span style="width:8px;height:8px;border-radius:50%;background:${statusColor(rawStatus)};flex-shrink:0;display:inline-block;box-shadow:0 0 4px ${statusColor(rawStatus)}66"></span>
            ${escHtml(humanizeStatus(rawStatus))}
          </div>
        </div>` : null,
      ].filter(Boolean);

      return `<div class="ondemand-driver-popup__content">
        ${sections.join('<div class="ondemand-driver-popup__divider"></div>')}
      </div>`;
    }

    const POPUP_OPTS = {
      className: 'ondemand-driver-popup',
      closeButton: false,
      autoClose: true,
      autoPan: false,
      offset: [0, -20],
    };

    // ---- Upsert van marker (bus body + bubble label) ----
    function upsertVehicleMarker(locData) {
      const loc = locData.location;
      if (!loc || !loc.coordinates) return;
      const [lng, lat] = loc.coordinates;
      const vid = locData.vehicleId;
      const bearing = locData.bearing ?? 0;

      // Keep vehicleData location in sync so popup can read it
      if (vehicleData[vid]) vehicleData[vid].currentLocation = locData;

      const v = vehicleData[vid] || {};
      const label = v.identifier || 'Van';
      const spareColor = getVanColor(label, '#7c3aed');
      const busIcon    = makeBusMarkerIcon(bearing, spareColor);
      const bubbleIcon = createBubbleIcon(label, spareColor);
      const popupHtml  = buildPopupHtml(vid);

      if (vehicleMarkers[vid]) {
        vehicleMarkers[vid].setLatLng([lat, lng]).setIcon(busIcon).setPopupContent(popupHtml);
        bubbleMarkers[vid].setLatLng([lat, lng]).setIcon(bubbleIcon);
      } else {
        vehicleMarkers[vid] = L.marker([lat, lng], { icon: busIcon })
          .bindPopup(popupHtml, POPUP_OPTS)
          .addTo(map);
        bubbleMarkers[vid] = L.marker([lat, lng], { icon: bubbleIcon, interactive: false }).addTo(map);
      }

      // Speed bubble — show if Spare provides speed in the location payload (m/s → mph)
      const rawSpeedMs = locData.speed ?? locData.groundSpeed ?? locData.speedMs ?? null;
      const speedMph = rawSpeedMs != null ? rawSpeedMs * 2.23694 : null;
      if (speedMph != null && speedMph >= 0) {
        const speedIcon = createSpeedBubbleIcon(speedMph, spareColor);
        if (speedMarkers[vid]) {
          speedMarkers[vid].setLatLng([lat, lng]).setIcon(speedIcon);
        } else {
          speedMarkers[vid] = L.marker([lat, lng], { icon: speedIcon, interactive: false }).addTo(map);
        }
      } else if (speedMarkers[vid]) {
        map.removeLayer(speedMarkers[vid]);
        delete speedMarkers[vid];
      }
    }

    // ---- Info-card section builder (matches testmap buildInfoCardSection) ----
    function buildInfoCard(primary, secondary, color, meta) {
      primary   = (primary   || '').trim();
      secondary = (secondary || '').trim();
      meta      = (meta      || '').trim();
      if (!primary && !secondary) return '';
      const lines = [];
      if (primary)   lines.push(`<div class="bus-popup__info-line bus-popup__info-line--route">${escHtml(primary)}</div>`);
      if (secondary) lines.push(`<div class="bus-popup__info-line bus-popup__info-line--block">${escHtml(secondary)}</div>`);
      if (meta)      lines.push(`<div class="bus-popup__info-line bus-popup__info-line--meta">${escHtml(meta)}</div>`);
      return `<div class="ondemand-driver-popup__section">
        <div class="bus-popup__drivers-list">
          <div class="bus-popup__driver-row bus-popup__info-card" style="border-left-color:${color};">
            ${lines.join('')}
          </div>
        </div>
      </div>`;
    }

    // ---- OnDemand stop plan normalizer (simplified — no ride visibility filtering) ----
    function normalizeOdStopPlan(rawStops) {
      if (!Array.isArray(rawStops)) return [];
      const normalized = [];
      let fallbackOrder = 1;
      for (const stop of rawStops) {
        if (!stop || typeof stop !== 'object') continue;
        const baseAddress = (stop.address || '').trim();
        const stopRideId  = stop.rideId || stop.ride_id || '';
        const stopStatus  = stop.status || stop.rideStatus || stop.ride_status || '';
        const rides = Array.isArray(stop.rides) ? stop.rides : null;
        if (rides) {
          const baseOrder = Number.isFinite(Number(stop.order)) ? Number(stop.order) : fallbackOrder;
          for (const ride of rides) {
            if (!ride || typeof ride !== 'object') continue;
            const type   = ride.stop_type || ride.stopType || stop.stopType || stop.stop_type || '';
            const rideId = ride.rideId || ride.ride_id || ride.id || '';
            const status = ride.status || ride.rideStatus || ride.ride_status || '';
            const riders = Array.isArray(ride.riders) ? ride.riders : (Array.isArray(ride.passengers) ? ride.passengers : []);
            const t = `${type}`.trim().toLowerCase();
            if (t !== 'pickup' && t !== 'dropoff') continue;
            normalized.push({ order: baseOrder, stopType: t, address: baseAddress,
              riders: riders.map(r => `${r}`.trim()).filter(Boolean),
              rideId: rideId ? `${rideId}` : undefined,
              rideStatus: status ? `${status}` : undefined });
          }
          continue;
        }
        const t = `${stop.stopType || stop.stop_type || ''}`.trim().toLowerCase();
        if (t !== 'pickup' && t !== 'dropoff') continue;
        const orderVal = Number(stop.order);
        const riders = Array.isArray(stop.riders) ? stop.riders : [];
        normalized.push({ order: Number.isFinite(orderVal) ? orderVal : fallbackOrder++,
          stopType: t, address: baseAddress,
          riders: riders.map(r => `${r}`.trim()).filter(Boolean),
          rideId: stopRideId ? `${stopRideId}` : undefined,
          rideStatus: stopStatus ? `${stopStatus}` : undefined });
      }
      normalized.sort((a, b) => a.order - b.order);
      return normalized;
    }

    // ---- Render stop plan as ride cards (matches testmap renderOnDemandStopList) ----
    function renderOdStopList(stopPlan) {
      if (!stopPlan.length) return '';
      const rideMap = new Map();
      for (const stop of stopPlan) {
        const key = stop.rideId || (stop.riders.length ? stop.riders.join(',') : `stop-${stop.order}`);
        if (!rideMap.has(key)) {
          rideMap.set(key, { riders: stop.riders, pickup: null, dropoff: null,
            minOrder: stop.order, rideStatus: stop.rideStatus || '' });
        }
        const ride = rideMap.get(key);
        if (stop.stopType === 'pickup')  { ride.pickup  = stop; ride.minOrder = Math.min(ride.minOrder, stop.order); }
        if (stop.stopType === 'dropoff') { ride.dropoff = stop; }
        if (!ride.riders.length && stop.riders.length) ride.riders = stop.riders;
        if (stop.rideStatus && ride.rideStatus !== 'in_progress') ride.rideStatus = stop.rideStatus;
      }
      const rides = [...rideMap.values()].sort((a, b) => (a.minOrder || 999) - (b.minOrder || 999));
      const cards = rides.map(ride => {
        const name = ride.riders.join(', ') || 'Rider';
        const nextOrder = ride.pickup?.order ?? ride.dropoff?.order;
        const orderLabel = Number.isFinite(nextOrder) ? `#${nextOrder}` : '';
        const isOnBoard = !ride.pickup && ride.dropoff && ride.rideStatus === 'in_progress';
        const pickupAddr  = ride.pickup?.address || (isOnBoard ? 'On board' : 'Unknown pickup');
        const dropoffAddr = ride.dropoff?.address || 'Unknown dropoff';
        const pickupClass = isOnBoard
          ? 'ondemand-driver-popup__ride-location-icon ondemand-driver-popup__ride-location-icon--onboard'
          : 'ondemand-driver-popup__ride-location-icon ondemand-driver-popup__ride-location-icon--pickup';
        const pickupIcon = isOnBoard ? '✓' : 'P';
        return `<div class="ondemand-driver-popup__ride-card">
          <div class="ondemand-driver-popup__ride-header">
            <span class="ondemand-driver-popup__ride-name">${escHtml(name)}</span>
            ${orderLabel ? `<span class="ondemand-driver-popup__ride-order">${escHtml(orderLabel)}</span>` : ''}
          </div>
          <div class="ondemand-driver-popup__ride-locations">
            <div class="ondemand-driver-popup__ride-location">
              <span class="${pickupClass}">${pickupIcon}</span>
              <span class="ondemand-driver-popup__ride-location-text">${escHtml(pickupAddr)}</span>
            </div>
            <div class="ondemand-driver-popup__ride-location">
              <span class="ondemand-driver-popup__ride-location-icon ondemand-driver-popup__ride-location-icon--dropoff">D</span>
              <span class="ondemand-driver-popup__ride-location-text">${escHtml(dropoffAddr)}</span>
            </div>
          </div>
        </div>`;
      }).join('');
      return `<div class="ondemand-driver-popup__stops">
        <div class="ondemand-driver-popup__label">Rides</div>
        <div class="ondemand-driver-popup__rides">${cards}</div>
      </div>`;
    }

    // ---- OnDemand popup ----
    function buildOdPopupHtml(v, color) {
      const name   = parseOdCallName(v.callName) || `Van ${v.vehicleId}`;
      const driver = v.driverName || null;
      const stopPlan  = normalizeOdStopPlan(v.stops || []);
      const stopHtml  = renderOdStopList(stopPlan);
      const onboardRiders = stopPlan
        .filter(s => s.stopType === 'dropoff' && s.rideStatus === 'in_progress')
        .flatMap(s => s.riders);
      const sections = [
        buildInfoCard(name, 'TransLoc OnDemand', color),
        driver ? buildInfoCard(driver, 'OnDemand Driver', color) : null,
        onboardRiders.length
          ? `<div class="ondemand-driver-popup__section">
               <div class="ondemand-driver-popup__label">Passengers on board</div>
               <div class="ondemand-driver-popup__value">${escHtml(onboardRiders.join(', '))}</div>
             </div>`
          : null,
        stopHtml || null,
      ].filter(Boolean);
      return `<div class="ondemand-driver-popup__content">
        ${sections.join('<div class="ondemand-driver-popup__divider"></div>')}
      </div>`;
    }

    // ---- OnDemand marker upsert ----
    function upsertOdMarker(v) {
      const key     = 'od_' + v.vehicleId;
      const lat     = v.lat, lng = v.lng;
      const bearing = v.heading ?? 0;
      const label   = parseOdCallName(v.callName) || 'Van';
      const color   = getVanColor(label, v.markerColor || '#ec4899');
      const busIcon    = makeBusMarkerIcon(bearing, color);
      const bubbleIcon = createBubbleIcon(label, color);
      const popupHtml  = buildOdPopupHtml(v, color);
      if (odVehicleMarkers[key]) {
        odVehicleMarkers[key].setLatLng([lat, lng]).setIcon(busIcon).setPopupContent(popupHtml);
        odBubbleMarkers[key].setLatLng([lat, lng]).setIcon(bubbleIcon);
      } else {
        odVehicleMarkers[key] = L.marker([lat, lng], { icon: busIcon })
          .bindPopup(popupHtml, POPUP_OPTS).addTo(map);
        odBubbleMarkers[key] = L.marker([lat, lng], { icon: bubbleIcon, interactive: false }).addTo(map);
      }
      if (typeof v.speed === 'number' && v.speed >= 0) {
        const speedIcon = createSpeedBubbleIcon(v.speed, color);
        if (odSpeedMarkers[key]) {
          odSpeedMarkers[key].setLatLng([lat, lng]).setIcon(speedIcon);
        } else {
          odSpeedMarkers[key] = L.marker([lat, lng], { icon: speedIcon, interactive: false }).addTo(map);
        }
      } else if (odSpeedMarkers[key]) {
        map.removeLayer(odSpeedMarkers[key]);
        delete odSpeedMarkers[key];
      }
    }

    function removeOdMarker(key) {
      if (odVehicleMarkers[key]) { map.removeLayer(odVehicleMarkers[key]); delete odVehicleMarkers[key]; }
      if (odBubbleMarkers[key])  { map.removeLayer(odBubbleMarkers[key]);  delete odBubbleMarkers[key]; }
      if (odSpeedMarkers[key])   { map.removeLayer(odSpeedMarkers[key]);   delete odSpeedMarkers[key]; }
    }

    // ---- OnDemand fetch + poll ----
    async function fetchOnDemand() {
      let res;
      try {
        res = await fetch('/api/ondemand');
      } catch (err) {
        // Network failure — keep last known state silently
        return;
      }
      if (res.status === 403 || res.status === 401) return; // not logged in — silent
      if (!res.ok) return; // any other error — keep last known state

      let data;
      try {
        data = await res.json();
      } catch (err) {
        return; // malformed response — keep last known state
      }

      const vehicles = Array.isArray(data.vehicles) ? data.vehicles : [];
      const active = new Set();
      const freshStops = [];

      for (const v of vehicles) {
        if (!v.vehicleId || v.lat == null || v.lng == null) continue;
        // Skip decommissioned vehicles
        const lastActive = v.lastActiveAt || v.last_active_at;
        if (lastActive) {
          if ((Date.now() - new Date(lastActive).getTime()) / 86400000 > 3) continue;
        } else if (v.stale) {
          continue;
        }
        upsertOdMarker(v);
        active.add('od_' + v.vehicleId);

        // Extract stops for the trip board
        const odLabel = parseOdCallName(v.callName) || 'Van';
        const odColor = getVanColor(odLabel, v.markerColor || '#ec4899');
        for (const stop of (v.stops || [])) {
          freshStops.push({
            ...stop,
            vehicleName: odLabel,
            vehicleColor: odColor,
          });
        }
      }

      // Remove markers for vans that left the response
      for (const key of Object.keys(odVehicleMarkers)) {
        if (!active.has(key)) removeOdMarker(key);
      }

      odStops = freshStops;
      document.getElementById('od-count').textContent = active.size;
      renderTrips();
    }

    // ---- Load vehicle roster (populates vehicleData + initial map pins) ----
    async function loadVehicleIdents() {
      try {
        const res = await fetch('/api/spare/vehicles');
        if (!res.ok) return;
        const vehicles = await res.json();
        (Array.isArray(vehicles) ? vehicles : []).forEach(v => {
          if (!v.id) return;
          vehicleData[v.id] = v;
          if (v.currentLocation) upsertVehicleMarker({ ...v.currentLocation, vehicleId: v.id });
        });
      } catch (e) { /* ignore */ }
    }

    // ---- SSE ----
    const sseDot   = document.getElementById('sse-dot');
    const sseLabel = document.getElementById('sse-label');

    function connectSSE() {
      const es = new EventSource('/stream/spare');
      es.onopen = () => { sseDot.className = 'dot live'; sseLabel.textContent = 'Live'; };
      es.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'initial') {
          (msg.data.vehicleLocations || []).forEach(upsertVehicleMarker);
          if (!msg.data.webhookConfigured) {
            document.getElementById('webhook-badge').style.display = '';
            document.getElementById('map-no-webhooks').style.display = 'block';
          }
        } else if (msg.type === 'vehicleLocation') {
          upsertVehicleMarker(msg.data);
          document.getElementById('map-no-webhooks').style.display = 'none';
          document.getElementById('webhook-badge').style.display = 'none';
        } else if (msg.type === 'requestStatus') {
          fetchTrips();
        }
      };
      es.onerror = () => {
        sseDot.className = 'dot off';
        sseLabel.textContent = 'Disconnected — reconnecting…';
        es.close();
        setTimeout(connectSSE, 5000);
      };
    }
    connectSSE();

    // ---- Trip board (Spare requests + OnDemand stops) ----
    let spareTrips = [];
    let odStops    = [];  // extracted from ondemand vehicle stop plans

    const SPARE_STATUS_ORDER = { arriving: 0, inProgress: 1, accepted: 2, processing: 3 };
    // OD rideStatus values we consider active (skip completed/cancelled)
    const OD_ACTIVE = new Set(['pending', 'in_progress', 'inProgress', 'scheduled', 'accepted']);
    const OD_STATUS_CLASS = { in_progress: 'inProgress', inProgress: 'inProgress', pending: 'accepted', scheduled: 'accepted', accepted: 'accepted' };
    const OD_STATUS_LABEL = { in_progress: 'In Progress', inProgress: 'In Progress', pending: 'Pending', scheduled: 'Scheduled', accepted: 'Accepted' };

    function riderName(req) {
      const r = req.rider;
      if (!r) return 'Rider';
      return [r.firstName, r.lastName].filter(Boolean).join(' ') || 'Rider';
    }

    function accessTags(req) {
      const features = req.accessibilityFeatures || [];
      if (!features.length) return '';
      return features.map(f => {
        const label = typeof f === 'object' ? (f.type || JSON.stringify(f)) : f;
        return `<span class="access-tag">${escHtml(label)}</span>`;
      }).join('');
    }

    function renderTrips() {
      const list = document.getElementById('trips-list');
      document.getElementById('trips-updated').textContent = new Date().toLocaleTimeString();
      const cards = [];

      // Spare requests
      const sorted = [...spareTrips].sort((a,b) => (SPARE_STATUS_ORDER[a.status]??9)-(SPARE_STATUS_ORDER[b.status]??9));
      for (const req of sorted) {
        const name   = riderName(req);
        const status = req.status || 'unknown';
        const pickup  = req.scheduledPickupAddress  || req.requestedPickupAddress  || '—';
        const dropoff = req.scheduledDropoffAddress || req.requestedDropoffAddress || '—';
        const puEta = req.pickupEta  ? fmtTime(req.pickupEta)  : fmtTime(req.scheduledPickupTs);
        const doEta = req.dropoffEta ? fmtTime(req.dropoffEta) : fmtTime(req.scheduledDropoffTs);
        const notes  = req.notes ? `<div class="addr" style="color:#ffd54f;margin-top:.25rem">📝 ${escHtml(req.notes)}</div>` : '';
        const riders = req.numRiders ? ` · ${req.numRiders} rider${req.numRiders>1?'s':''}` : '';
        cards.push(`<div class="trip-card ${status}">
          <div class="trip-header">
            <span class="status-pill ${status}">${status}</span>
            <span class="rider-name">${escHtml(name)}${riders}</span>
            <span class="source-badge source-badge--spare" style="margin-left:auto">Spare</span>
          </div>
          <div class="trip-body">
            <div class="addr">▲ ${escHtml(pickup)}</div>
            <div class="addr">▼ ${escHtml(dropoff)}</div>
            <div class="trip-meta">
              <span><span class="eta-label">PU</span> <span class="eta-time">${puEta}</span></span>
              <span><span class="eta-label">DO</span> <span class="eta-time">${doEta}</span></span>
            </div>
            ${notes}
            <div class="access-icons">${accessTags(req)}</div>
          </div>
        </div>`);
      }

      // OnDemand stops (active only)
      for (const stop of odStops) {
        const rs = stop.rideStatus || '';
        if (!OD_ACTIVE.has(rs) && rs !== '') continue;
        const cls   = OD_STATUS_CLASS[rs] || 'processing';
        const lbl   = OD_STATUS_LABEL[rs] || (rs || 'Active');
        const names = (stop.riders || []).join(', ') || 'Rider';
        const icon  = stop.stopType === 'pickup' ? '▲' : '▼';
        const typeLabel = stop.stopType === 'pickup' ? 'Pickup' : 'Drop-off';
        const vehColor = stop.vehicleColor || '#ec4899';
        cards.push(`<div class="trip-card ${cls}">
          <div class="trip-header">
            <span class="status-pill ${cls}">${escHtml(lbl)}</span>
            <span class="rider-name">${escHtml(names)}</span>
            <span class="source-badge source-badge--w2w" style="margin-left:auto">OD</span>
          </div>
          <div class="trip-body">
            <div class="addr" style="color:#aaa;font-size:.72rem;margin-bottom:.15rem">${escHtml(typeLabel)} · <span style="color:${vehColor};font-weight:600">${escHtml(stop.vehicleName)}</span></div>
            <div class="addr">${icon} ${escHtml(stop.address || '—')}</div>
          </div>
        </div>`);
      }

      document.getElementById('trip-count').textContent = cards.length;
      list.innerHTML = cards.length ? cards.join('') : '<div class="no-trips">No active trips right now</div>';
    }

    async function fetchTrips() {
      try {
        const res = await fetch('/api/spare/requests');
        if (!res.ok) {
          if (res.status === 503) {
            document.getElementById('trips-list').innerHTML = '<div class="no-trips">⚠ Spare not configured — set SPARE_API_KEY</div>';
            return;
          }
          return; // soft-fail: keep last known board
        }
        const trips = await res.json();
        spareTrips = Array.isArray(trips) ? trips : [];
        renderTrips();
      } catch (err) {
        console.error('[spare] trips fetch failed:', err);
        // soft-fail: board unchanged
      }
    }

    // ---- Duty roster (combined: Spare duties + W2W OnDemand shifts) ----
    let spareDuties = [];
    let w2wShifts   = [];

    function renderDuties() {
      const tbody = document.getElementById('duties-tbody');
      const rows = [];

      for (const d of spareDuties) {
        const driver = d.driver || {};
        const driverName = [driver.firstName, driver.lastName].filter(Boolean).join(' ') || '—';
        const vehName = (d.vehicle && d.vehicle.identifier)
          || (vehicleData[d.vehicleId] && vehicleData[d.vehicleId].identifier) || '—';
        rows.push({
          source: 'spare',
          startMs: (d.startRequestedTs || 0) * 1000,
          driverName,
          assignment: vehName,
          status: d.status || 'unknown',
          shiftStr: `${fmtTime(d.startRequestedTs)} – ${fmtTime(d.endRequestedTs)}`,
          detail: d.identifier || '',
        });
      }

      for (const s of w2wShifts) {
        rows.push({
          source: 'w2w',
          startMs: s.start_ts || 0,
          driverName: s.name || '—',
          assignment: s.position_name || 'OnDemand',
          status: 'shift',
          shiftStr: `${fmtTime(s.start_ts / 1000)} – ${fmtTime(s.end_ts / 1000)}`,
          detail: '',
        });
      }

      document.getElementById('duty-count').textContent = rows.length;

      if (!rows.length) {
        tbody.innerHTML = '<tr><td colspan="5" class="no-duties">No shifts or duties today</td></tr>';
        return;
      }

      rows.sort((a, b) => a.startMs - b.startMs);

      tbody.innerHTML = rows.map(r => {
        const srcBadge = r.source === 'spare'
          ? `<span class="source-badge source-badge--spare">Spare</span>${r.detail ? ` <span style="color:#666;font-size:.7rem">${escHtml(r.detail)}</span>` : ''}`
          : `<span class="source-badge source-badge--w2w">W2W</span>`;
        const statusCell = r.source === 'spare'
          ? `<span class="duty-status ${r.status}">${escHtml(humanizeStatus(r.status))}</span>`
          : `<span class="duty-status scheduled" style="background:#1a2a1e;color:#6ee7b7">Shift</span>`;
        const assignCell = r.source === 'w2w'
          ? `<span style="color:#9980d0">${escHtml(r.assignment)}</span>`
          : escHtml(r.assignment);
        return `<tr>
          <td>${escHtml(r.driverName)}</td>
          <td>${assignCell}</td>
          <td>${statusCell}</td>
          <td>${escHtml(r.shiftStr)}</td>
          <td>${srcBadge}</td>
        </tr>`;
      }).join('');
    }

    async function fetchDuties() {
      try {
        const res = await fetch('/api/spare/duties');
        if (!res.ok) return;
        const dutiesJson = await res.json();
        spareDuties = Array.isArray(dutiesJson) ? dutiesJson : [];
        spareDuties.forEach(d => { if (d.id) dutiesData[d.id] = d; });
        renderDuties();
        Object.keys(vehicleMarkers).forEach(vid => vehicleMarkers[vid].setPopupContent(buildPopupHtml(vid)));
      } catch (err) {
        console.error('duties fetch failed:', err);
      }
    }

    async function fetchW2WShifts() {
      try {
        const res = await fetch('/v1/dispatch/block-drivers');
        if (res.status === 403 || res.status === 401) return;
        if (!res.ok) return;
        const data = await res.json();
        const byBlock = data.assignments_by_block || {};
        const shifts = [];
        for (const blockName of ['OnDemand Driver', 'OnDemand EB']) {
          const block = byBlock[blockName];
          if (!block) continue;
          for (const period of Object.values(block)) {
            for (const s of period) {
              shifts.push({ ...s, position_name: blockName });
            }
          }
        }
        w2wShifts = shifts;
        renderDuties();
      } catch (err) {
        console.error('[w2w] fetch failed:', err);
      }
    }

    // ---- Last refresh ----
    function updateLastRefresh() {
      document.getElementById('last-refresh').textContent = 'Updated ' + new Date().toLocaleTimeString();
    }

    // ---- Initial load + polling ----
    loadVanColors().then(() => {
      loadVehicleIdents();
      fetchOnDemand();
    });
    fetchTrips();
    fetchDuties();
    fetchW2WShifts();
    updateLastRefresh();

    setInterval(() => { fetchTrips(); updateLastRefresh(); }, 30_000);
    setInterval(fetchDuties, 60_000);
    setInterval(fetchW2WShifts, 60_000);
    setInterval(loadVehicleIdents, 120_000);
    setInterval(loadVanColors, 60_000);
    setInterval(fetchOnDemand, 10_000);
  </script>
</body>
</html>
