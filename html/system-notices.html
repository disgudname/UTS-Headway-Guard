<!doctype html>
<link rel="icon" type="image/png" href="/media/favicon.ico" />
<link rel="apple-touch-icon" sizes="120x120" href="/media/apple-touch-icon-120.png" />
<link rel="apple-touch-icon" sizes="152x152" href="/media/apple-touch-icon-152.png" />
<link rel="apple-touch-icon" sizes="180x180" href="/media/apple-touch-icon-180.png" />
<meta charset="utf-8">
<title>System Notices - UTS Operations Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script defer src="/nav-bar.js"></script>
<style>
@font-face{font-family:'FGDC';src:url('FGDC.ttf') format('truetype')}
body{font:16px 'FGDC',system-ui;background:#0b0e11;color:#e8eef5;margin:0;padding:20px;}
label{display:block;margin:8px 0;}
input,textarea{width:100%;padding:6px;border-radius:4px;border:1px solid #2a3442;background:#10151c;color:#e8eef5;}
button{margin-top:12px;padding:10px 14px;border-radius:6px;border:1px solid #2a3442;background:#15202b;color:#e8eef5;cursor:pointer;}
.panel{margin-top:24px;padding:16px;border:1px solid #2a3442;border-radius:8px;background:#10151c;}
.panel h2{margin-top:0;margin-bottom:12px;font-size:18px;}
.credit{position:fixed;bottom:8px;right:8px;font-size:12px;color:var(--muted,#9fb0c9)}
.back-link{display:inline-block;margin-top:20px;color:#3a8ef6;text-decoration:none;}
.back-link:hover{text-decoration:underline;}
</style>
<h1>System Notices</h1>
<p style="color:#9fb0c9;">Create notices to display on the home page, and optionally in the RSS/CAP arrival signage feeds. Set time windows, visibility, and which stops they apply to.</p>
<div class="panel" id="systemNoticesPanel">
  <div id="noticesList" style="margin-bottom:16px;"></div>
  <div style="border:1px solid #2a3442;border-radius:6px;padding:12px;background:#15202b;">
    <h3 style="margin:0 0 12px;font-size:15px;">Add New Notice</h3>
    <label>Message (long form, shown on the home page)
      <textarea id="noticeMessage" rows="2" placeholder="Enter notice text..."></textarea>
    </label>
    <label style="margin-top:8px;display:block;">Short Message (for LED signage feeds)
      <textarea id="noticeShortMessage" rows="2" placeholder="Optional shorter text for RSS/CAP feeds. Falls back to the message above if left blank."></textarea>
      <span style="font-size:11px;color:#9fb0c9;">Plain ASCII only (no emoji, smart quotes, or accented characters) &mdash; LED signage hardware can't reliably render anything else.</span>
    </label>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px;">
      <label>Severity
        <select id="noticeSeverity" style="width:100%;padding:6px;border-radius:4px;border:1px solid #2a3442;background:#10151c;color:#e8eef5;">
          <option value="yellow">Yellow (Warning)</option>
          <option value="red">Red (Critical)</option>
          <option value="green">Green (Info)</option>
        </select>
      </label>
      <label style="display:flex;align-items:center;gap:8px;margin-top:auto;">
        <input type="checkbox" id="noticeAuthOnly" style="width:auto;">
        <span>Staff only</span>
      </label>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px;">
      <label>Start Time
        <input type="datetime-local" id="noticeStartTime">
      </label>
      <label>End Time
        <input type="datetime-local" id="noticeEndTime">
      </label>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px;">
      <label>Applies To
        <select id="noticeTargetScope" style="width:100%;padding:6px;border-radius:4px;border:1px solid #2a3442;background:#10151c;color:#e8eef5;">
          <option value="all">All stops (system-wide)</option>
          <option value="stops">Specific stops</option>
        </select>
      </label>
      <label id="noticeTargetStopIdsLabel" style="display:none;">Target Stop IDs
        <input type="text" id="noticeTargetStopIds" placeholder="e.g. 26, 40, 113">
      </label>
    </div>
    <div style="display:flex;gap:8px;margin-top:12px;">
      <button type="button" id="addNoticeBtn">Add Notice</button>
      <button type="button" id="cancelEditBtn" style="background:#666;display:none;">Cancel</button>
    </div>
  </div>
</div>
<a class="back-link" href="/admin">&larr; Back to Admin</a>
<div class="credit">proof of concept created by pat cox &bull; phc6j@virginia.edu</div>
<script>
function buildReturnTarget(){
  const path=window.location.pathname||'/';
  const search=window.location.search||'';
  const hash=window.location.hash||'';
  return `${path}${search}${hash}`;
}
function redirectToLogin(){
  const target=buildReturnTarget();
  window.location.href=`/login?return=${encodeURIComponent(target)}`;
}

// System Notices Management
const noticesList=document.getElementById('noticesList');
const noticeMessage=document.getElementById('noticeMessage');
const noticeShortMessage=document.getElementById('noticeShortMessage');
const noticeSeverity=document.getElementById('noticeSeverity');
const noticeAuthOnly=document.getElementById('noticeAuthOnly');
const noticeStartTime=document.getElementById('noticeStartTime');
const noticeEndTime=document.getElementById('noticeEndTime');
const noticeTargetScope=document.getElementById('noticeTargetScope');
const noticeTargetStopIds=document.getElementById('noticeTargetStopIds');
const noticeTargetStopIdsLabel=document.getElementById('noticeTargetStopIdsLabel');
const addNoticeBtn=document.getElementById('addNoticeBtn');
const cancelEditBtn=document.getElementById('cancelEditBtn');

function updateTargetStopIdsVisibility(){
  if(noticeTargetStopIdsLabel) noticeTargetStopIdsLabel.style.display = (noticeTargetScope?.value==='stops') ? 'block' : 'none';
}
if(noticeTargetScope){
  noticeTargetScope.addEventListener('change', updateTargetStopIdsVisibility);
  updateTargetStopIdsVisibility();
}

// Basic LED signage hardware can't reliably render Unicode (emoji, smart quotes, em/en
// dashes, accented characters) - strip anything outside plain printable ASCII as it's typed,
// so what the admin sees here matches what the sign will actually receive.
if(noticeShortMessage){
  noticeShortMessage.addEventListener('input', () => {
    const before = noticeShortMessage.value;
    const filtered = before.replace(/[^\x20-\x7E]/g, '');
    if(filtered !== before){
      const start = noticeShortMessage.selectionStart;
      const removedBeforeCursor = before.slice(0, start).length - before.slice(0, start).replace(/[^\x20-\x7E]/g, '').length;
      noticeShortMessage.value = filtered;
      const newPos = Math.max(0, start - removedBeforeCursor);
      noticeShortMessage.setSelectionRange(newPos, newPos);
    }
  });
}

function formatNoticeTime(isoStr){
  if(!isoStr) return 'Not set';
  try{
    const d=new Date(isoStr);
    return d.toLocaleString();
  }catch(e){return isoStr;}
}

function severityColor(sev){
  if(sev==='red') return '#ff6b6b';
  if(sev==='green') return '#4ecdc4';
  return '#ffd93d';
}

let editingNoticeId = null;

function renderNotices(notices){
  if(!noticesList) return;
  if(!notices.length){
    noticesList.innerHTML='<div style="color:#9fb0c9;font-size:14px;">No system notices configured.</div>';
    return;
  }
  const now=new Date();
  noticesList.innerHTML=notices.map(n=>{
    const isActive=(!n.start_time||new Date(n.start_time)<=now)&&(!n.end_time||new Date(n.end_time)>=now);
    const statusBadge=isActive?'<span style="background:#4ecdc4;color:#000;padding:2px 6px;border-radius:4px;font-size:11px;margin-left:8px;">ACTIVE</span>':'<span style="background:#666;color:#fff;padding:2px 6px;border-radius:4px;font-size:11px;margin-left:8px;">INACTIVE</span>';
    const authBadge=n.auth_only?'<span style="background:#3a8ef6;color:#fff;padding:2px 6px;border-radius:4px;font-size:11px;margin-left:4px;">STAFF ONLY</span>':'';
    const targetIds=Array.isArray(n.target_stop_ids)?n.target_stop_ids:[];
    const targetLabel=(n.target_scope==='stops'&&targetIds.length)?`Stops: ${targetIds.join(', ')}`:'All stops';
    const shortMsg=(n.short_message||'').trim();
    return `
      <div style="border:1px solid #2a3442;border-radius:6px;padding:12px;margin-bottom:8px;border-left:4px solid ${severityColor(n.severity)};" data-notice-id="${n.id}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
          <div style="flex:1;">
            <div style="font-size:14px;margin-bottom:6px;">${escapeHtml(n.message)}</div>
            ${shortMsg?`<div style="font-size:12px;color:#9fb0c9;margin-bottom:6px;">Signage text: ${escapeHtml(shortMsg)}</div>`:''}
            <div style="font-size:12px;color:#9fb0c9;">
              ${statusBadge}${authBadge}
              <span style="margin-left:8px;">Start: ${formatNoticeTime(n.start_time)}</span>
              <span style="margin-left:8px;">End: ${formatNoticeTime(n.end_time)}</span>
              <span style="margin-left:8px;">${targetLabel}</span>
            </div>
          </div>
          <div style="display:flex;gap:4px;">
            <button type="button" onclick="editNotice('${n.id}')" style="padding:4px 8px;font-size:12px;background:#3a8ef6;border:none;border-radius:4px;color:#fff;cursor:pointer;">Edit</button>
            <button type="button" onclick="deleteNotice('${n.id}')" style="padding:4px 8px;font-size:12px;background:#ff6b6b;border:none;border-radius:4px;color:#fff;cursor:pointer;">Delete</button>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

let cachedNotices = [];

function findNoticeById(id){
  return cachedNotices.find(n => n.id === id);
}

function toLocalDatetimeValue(isoStr){
  if(!isoStr) return '';
  try {
    const d = new Date(isoStr);
    const offset = d.getTimezoneOffset();
    const local = new Date(d.getTime() - offset * 60000);
    return local.toISOString().slice(0, 16);
  } catch(e) { return ''; }
}

function editNotice(id){
  const notice = findNoticeById(id);
  if(!notice) return;
  editingNoticeId = id;
  if(noticeMessage) noticeMessage.value = notice.message || '';
  if(noticeShortMessage) noticeShortMessage.value = notice.short_message || '';
  if(noticeSeverity) noticeSeverity.value = notice.severity || 'yellow';
  if(noticeAuthOnly) noticeAuthOnly.checked = Boolean(notice.auth_only);
  if(noticeStartTime) noticeStartTime.value = toLocalDatetimeValue(notice.start_time);
  if(noticeEndTime) noticeEndTime.value = toLocalDatetimeValue(notice.end_time);
  if(noticeTargetScope) noticeTargetScope.value = notice.target_scope === 'stops' ? 'stops' : 'all';
  if(noticeTargetStopIds) noticeTargetStopIds.value = Array.isArray(notice.target_stop_ids) ? notice.target_stop_ids.join(', ') : '';
  updateTargetStopIdsVisibility();
  if(addNoticeBtn) addNoticeBtn.textContent = 'Update Notice';
  if(cancelEditBtn) cancelEditBtn.style.display = 'inline-block';
  // Scroll to form
  document.getElementById('systemNoticesPanel')?.scrollIntoView({behavior:'smooth', block:'end'});
}

function cancelEdit(){
  editingNoticeId = null;
  if(noticeMessage) noticeMessage.value = '';
  if(noticeShortMessage) noticeShortMessage.value = '';
  if(noticeSeverity) noticeSeverity.value = 'yellow';
  if(noticeAuthOnly) noticeAuthOnly.checked = false;
  if(noticeStartTime) noticeStartTime.value = '';
  if(noticeEndTime) noticeEndTime.value = '';
  if(noticeTargetScope) noticeTargetScope.value = 'all';
  if(noticeTargetStopIds) noticeTargetStopIds.value = '';
  updateTargetStopIdsVisibility();
  if(addNoticeBtn) addNoticeBtn.textContent = 'Add Notice';
  if(cancelEditBtn) cancelEditBtn.style.display = 'none';
}

if(cancelEditBtn){
  cancelEditBtn.addEventListener('click', cancelEdit);
}

function escapeHtml(str){
  if(!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function loadNotices(){
  try{
    const resp=await fetch('/v1/system-notices?all=true',{cache:'no-store'});
    if(resp.status===401){
      redirectToLogin();
      return;
    }
    if(!resp.ok) throw new Error('Failed to load notices');
    const data=await resp.json();
    cachedNotices = data.notices || [];
    renderNotices(cachedNotices);
  }catch(err){
    console.error('Failed to load notices',err);
    if(noticesList) noticesList.innerHTML='<div style="color:#ff6b6b;">Failed to load notices.</div>';
  }
}

async function deleteNotice(id){
  if(!confirm('Delete this notice?')) return;
  try{
    const resp=await fetch(`/v1/system-notices/${id}`,{method:'DELETE'});
    if(resp.status===401){
      redirectToLogin();
      return;
    }
    if(!resp.ok) throw new Error('Delete failed');
    await loadNotices();
  }catch(err){
    console.error('Failed to delete notice',err);
    alert('Unable to delete notice.');
  }
}

if(addNoticeBtn){
  addNoticeBtn.addEventListener('click',async ()=>{
    const msg=(noticeMessage?.value||'').trim();
    if(!msg){
      alert('Please enter a message.');
      return;
    }
    const payload={
      message:msg,
      short_message:(noticeShortMessage?.value||'').trim(),
      severity:noticeSeverity?.value||'yellow',
      auth_only:noticeAuthOnly?.checked||false,
      start_time:noticeStartTime?.value?new Date(noticeStartTime.value).toISOString():null,
      end_time:noticeEndTime?.value?new Date(noticeEndTime.value).toISOString():null,
      target_scope:noticeTargetScope?.value||'all',
      target_stop_ids:(noticeTargetStopIds?.value||'').split(',').map(s=>s.trim()).filter(Boolean)
    };
    const isEditing = Boolean(editingNoticeId);
    addNoticeBtn.disabled=true;
    addNoticeBtn.textContent=isEditing?'Updating...':'Adding...';
    try{
      const url = isEditing ? `/v1/system-notices/${editingNoticeId}` : '/v1/system-notices';
      const method = isEditing ? 'PUT' : 'POST';
      const resp=await fetch(url,{
        method,
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(payload)
      });
      if(resp.status===401){
        redirectToLogin();
        return;
      }
      if(!resp.ok) throw new Error(isEditing?'Update failed':'Create failed');
      cancelEdit();
      await loadNotices();
    }catch(err){
      console.error(isEditing?'Failed to update notice':'Failed to create notice',err);
      alert(isEditing?'Unable to update notice.':'Unable to create notice.');
    }finally{
      addNoticeBtn.disabled=false;
      addNoticeBtn.textContent=editingNoticeId?'Update Notice':'Add Notice';
    }
  });
}

loadNotices();
</script>
