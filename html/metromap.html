<!DOCTYPE html>
<html>
<head>
  <link rel="icon" type="image/png" href="/media/favicon.ico" />
  <link rel="apple-touch-icon" sizes="120x120" href="/media/apple-touch-icon-120.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="/media/apple-touch-icon-152.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/media/apple-touch-icon-180.png" />
  <title>Metro Map - UTS Operations Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #f4f0e8; overflow: hidden; font-family: sans-serif; }
    #map { width: 100%; height: 100%; display: block; }
    #status {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #555; font-size: 18px;
    }
    #legend {
      position: absolute; bottom: 16px; left: 16px;
      background: rgba(255,255,255,0.92);
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 10px 14px;
      max-height: calc(100vh - 48px);
      overflow-y: auto;
    }
    .leg { display: flex; align-items: center; gap: 8px; padding: 3px 0; cursor: default; }
    .leg-line { width: 28px; height: 7px; border-radius: 4px; flex-shrink: 0; }
    .leg-name { font-size: 12px; color: #222; white-space: nowrap; }
    .leg.inactive .leg-name { color: #aaa; }
    .leg.inactive .leg-line { opacity: 0.4; }
  </style>
</head>
<body>
  <svg id="map"></svg>
  <div id="status">Loading routes&hellip;</div>
  <div id="legend"></div>
  <script>
  // ── Inline polyline decoder (no external deps) ──────────────────────────
  function decodePolyline(enc) {
    const pts = [];
    let i = 0, lat = 0, lon = 0;
    while (i < enc.length) {
      let b, shift = 0, res = 0;
      do { b = enc.charCodeAt(i++) - 63; res |= (b & 0x1f) << shift; shift += 5; } while (b >= 32);
      lat += (res & 1) ? ~(res >> 1) : res >> 1;
      shift = 0; res = 0;
      do { b = enc.charCodeAt(i++) - 63; res |= (b & 0x1f) << shift; shift += 5; } while (b >= 32);
      lon += (res & 1) ? ~(res >> 1) : res >> 1;
      pts.push([lat / 1e5, lon / 1e5]);
    }
    return pts; // [[lat,lon], ...]
  }

  // ── Douglas-Peucker simplification ──────────────────────────────────────
  function dpSimplify(pts, eps) {
    if (pts.length <= 2) return pts.slice();
    let maxD = 0, maxI = 0;
    const [ax, ay] = pts[0], [bx, by] = pts[pts.length - 1];
    const abx = bx - ax, aby = by - ay, ab2 = abx * abx + aby * aby;
    for (let i = 1; i < pts.length - 1; i++) {
      const [px, py] = pts[i];
      let d;
      if (ab2 === 0) {
        d = Math.hypot(px - ax, py - ay);
      } else {
        const t = Math.max(0, Math.min(1, ((px - ax) * abx + (py - ay) * aby) / ab2));
        d = Math.hypot(px - (ax + t * abx), py - (ay + t * aby));
      }
      if (d > maxD) { maxD = d; maxI = i; }
    }
    if (maxD > eps) {
      const L = dpSimplify(pts.slice(0, maxI + 1), eps);
      const R = dpSimplify(pts.slice(maxI), eps);
      return [...L.slice(0, -1), ...R];
    }
    return [pts[0], pts[pts.length - 1]];
  }

  // ── Octilinear snapping ──────────────────────────────────────────────────
  // Snaps each segment to the nearest multiple of 45°, chaining endpoints.
  function snapOctilinear(pts) {
    if (pts.length < 2) return pts.slice();
    const out = [pts[0].slice()];
    for (let i = 1; i < pts.length; i++) {
      const [px, py] = out[out.length - 1];
      const [cx, cy] = pts[i];
      const dx = cx - px, dy = cy - py;
      const angle = Math.atan2(dy, dx);
      const snapped = Math.round(angle / (Math.PI / 4)) * (Math.PI / 4);
      const len = Math.hypot(dx, dy);
      out.push([px + Math.cos(snapped) * len, py + Math.sin(snapped) * len]);
    }
    return out;
  }

  // ── Coordinate → SVG projection ─────────────────────────────────────────
  function makeProjection(rawPts, W, H, pad) {
    let minLat = Infinity, maxLat = -Infinity, minLon = Infinity, maxLon = -Infinity;
    for (const [lat, lon] of rawPts) {
      if (lat < minLat) minLat = lat;
      if (lat > maxLat) maxLat = lat;
      if (lon < minLon) minLon = lon;
      if (lon > maxLon) maxLon = lon;
    }
    const latSpan = maxLat - minLat || 0.01;
    const lonSpan = maxLon - minLon || 0.01;
    const sx = (W - pad * 2) / lonSpan;
    const sy = (H - pad * 2) / latSpan;
    const scale = Math.min(sx, sy);
    const ox = pad + ((W - pad * 2) - lonSpan * scale) / 2;
    const oy = pad + ((H - pad * 2) - latSpan * scale) / 2;
    return ([lat, lon]) => [ox + (lon - minLon) * scale, oy + (maxLat - lat) * scale];
  }

  // ── SVG helpers ──────────────────────────────────────────────────────────
  const NS = 'http://www.w3.org/2000/svg';
  function el(tag, attrs) {
    const e = document.createElementNS(NS, tag);
    for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
    return e;
  }
  function pathD(projPts) {
    return 'M ' + projPts.map(([x, y]) => `${x.toFixed(1)} ${y.toFixed(1)}`).join(' L ');
  }

  // ── Color normalization ──────────────────────────────────────────────────
  function normalizeColor(c) {
    if (!c) return '#888888';
    c = c.trim().replace(/^#/, '');
    if (/^[0-9a-fA-F]{6}$/.test(c)) return '#' + c;
    if (/^[0-9a-fA-F]{3}$/.test(c)) return '#' + c[0]+c[0]+c[1]+c[1]+c[2]+c[2];
    return '#888888';
  }

  // ── Main ─────────────────────────────────────────────────────────────────
  async function main() {
    const statusEl = document.getElementById('status');
    const legendEl = document.getElementById('legend');
    const svg = document.getElementById('map');

    // Fetch route list
    const { routes } = await fetch('/v1/routes').then(r => r.json());

    // Fetch shapes in parallel, skip routes that 404 (inactive w/o cached shape)
    const shapes = (await Promise.all(routes.map(async r => {
      try {
        const s = await fetch(`/v1/routes/${r.id}/shape`).then(x => {
          if (!x.ok) return null;
          return x.json();
        });
        if (!s) return null;
        const raw = decodePolyline(s.polyline);
        if (raw.length < 2) return null;
        return {
          id: r.id,
          name: r.name.replace(/ \(inactive\)$/, ''),
          color: normalizeColor(s.color),
          active: r.active_vehicles > 0,
          raw,
        };
      } catch { return null; }
    }))).filter(Boolean);

    if (!shapes.length) {
      statusEl.textContent = 'No route data available.';
      return;
    }

    // Simplify then snap each route
    // epsilon in degrees: ~0.0004° ≈ 44m. Tune this for desired smoothness.
    const EPSILON = 4e-4;
    for (const r of shapes) {
      r.simplified = dpSimplify(r.raw, EPSILON);
      r.snapped = snapOctilinear(r.simplified);
    }

    // Size SVG
    const W = window.innerWidth, H = window.innerHeight;
    svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

    // Project using raw (true) bounding box so geographic layout is preserved
    const allRaw = shapes.flatMap(r => r.raw);
    const proj = makeProjection(allRaw, W, H, 72);

    for (const r of shapes) {
      r.projPts = r.snapped.map(proj);
    }

    // Detect interchange points: snapped points from different routes within N px
    const XCHG_R = 14;
    const interchanges = [];
    for (let i = 0; i < shapes.length; i++) {
      for (const p of shapes[i].projPts) {
        for (let j = i + 1; j < shapes.length; j++) {
          for (const q of shapes[j].projPts) {
            if (Math.hypot(p[0] - q[0], p[1] - q[1]) < XCHG_R) {
              if (!interchanges.some(x => Math.hypot(x[0] - p[0], x[1] - p[1]) < XCHG_R)) {
                interchanges.push(p);
              }
            }
          }
        }
      }
    }

    // ── Draw ────────────────────────────────────────────────────────────────
    statusEl.remove();

    const LINE_W = 8;

    // Layer order: halos → lines → interchange dots → terminus dots
    const haloG = el('g', {});
    const lineG = el('g', {});
    const dotG  = el('g', {});
    svg.appendChild(haloG);
    svg.appendChild(lineG);
    svg.appendChild(dotG);

    // Sort: active routes on top
    const sorted = [...shapes].sort((a, b) => a.active === b.active ? 0 : a.active ? 1 : -1);

    for (const r of sorted) {
      const d = pathD(r.projPts);
      const op = r.active ? '1' : '0.35';

      haloG.appendChild(el('path', {
        d, fill: 'none', stroke: '#ffffff',
        'stroke-width': LINE_W + 5,
        'stroke-linecap': 'round', 'stroke-linejoin': 'round',
        opacity: op,
      }));
      lineG.appendChild(el('path', {
        d, fill: 'none', stroke: r.color,
        'stroke-width': LINE_W,
        'stroke-linecap': 'round', 'stroke-linejoin': 'round',
        opacity: op,
      }));
    }

    // Interchange circles (white with dark ring)
    for (const [x, y] of interchanges) {
      dotG.appendChild(el('circle', { cx: x, cy: y, r: 8, fill: '#fff', stroke: '#222', 'stroke-width': 2.5 }));
    }

    // Terminus dots for each route (first + last projected point)
    for (const r of shapes) {
      if (!r.projPts.length) continue;
      for (const [x, y] of [r.projPts[0], r.projPts[r.projPts.length - 1]]) {
        if (interchanges.some(ip => Math.hypot(ip[0] - x, ip[1] - y) < XCHG_R)) continue;
        dotG.appendChild(el('circle', { cx: x, cy: y, r: 5, fill: r.color, stroke: '#fff', 'stroke-width': 2 }));
      }
    }

    // ── Legend ───────────────────────────────────────────────────────────────
    const legendRoutes = [...shapes].sort((a, b) => {
      if (a.active !== b.active) return a.active ? -1 : 1;
      return a.name.localeCompare(b.name);
    });
    for (const r of legendRoutes) {
      const row = document.createElement('div');
      row.className = 'leg' + (r.active ? '' : ' inactive');
      const swatch = document.createElement('div');
      swatch.className = 'leg-line';
      swatch.style.background = r.color;
      const label = document.createElement('span');
      label.className = 'leg-name';
      label.textContent = r.name;
      row.appendChild(swatch);
      row.appendChild(label);
      legendEl.appendChild(row);
    }
  }

  main().catch(err => {
    document.getElementById('status').textContent = 'Failed to load routes.';
    console.error(err);
  });
  </script>
</body>
</html>
